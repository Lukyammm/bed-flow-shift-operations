    function formatDateTimeBr(value) {
      if (!value) return "";
      const date = new Date(String(value).replace(" ", "T"));
      return isNaN(date) ? String(value) : date.toLocaleString("pt-BR");
    }

    function normalizeDateValue(value) {
      if (!value) return "";
      if (Object.prototype.toString.call(value) === "[object Date]" && !isNaN(value)) {
        return value.toISOString().slice(0, 10);
      }
      const text = String(value).trim();
      const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
      const br = text.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})/);
      if (br) {
        const year = br[3].length === 2 ? `20${br[3]}` : br[3];
        return `${year}-${pad2(br[2])}-${pad2(br[1])}`;
      }
      const date = new Date(text.replace(" ", "T"));
      if (isNaN(date)) return "";
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function formatDateBr(value) {
      const normalized = normalizeDateValue(value);
      if (!normalized) return value ? String(value) : "";
      const parts = normalized.split("-");
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function isDateOnlyKey(key) {
      return ["data", "data_solicitacao", "data_internacao", "data_programacao", "ultimo_contato", "data_inicio", "previsao"].includes(key);
    }

    function openRecordDrawer(moduleKey, row = {}) {
      const meta = MODULES[moduleKey];
      state.editing = { type: "record", moduleKey, row };
      el.drawerTitle.textContent = row.id ? "Editar registro" : "Novo registro";
      el.drawerSubtitle.textContent = meta.title;
      el.drawerBody.innerHTML = renderFields(meta.fields, row);
      openDrawer();
    }

    function openShiftDrawer() {
      const row = state.app && state.app.activeShift ? state.app.activeShift : { data: today(), turno: "MT" };
      state.editing = { type: "shift", row };
      el.drawerTitle.textContent = row.id ? "Equipe do plantão" : "Abrir plantão";
      el.drawerSubtitle.textContent = "Data, turno, ilhas e responsáveis";
      el.drawerBody.innerHTML = renderFields([
        ["data", "Data", "date"],
        ["turno", "Turno", "select", ["MT", "SN"]],
        ["medico_ilha_1", "Médico ilha 1", "text"],
        ["medico_ilha_2", "Médico ilha 2", "text"],
        ["medico_ilha_3", "Médico ilha 3", "text"],
        ["enfermeiro_ilha_1", "Enfermeiro ilha 1", "text"],
        ["enfermeiro_ilha_2", "Enfermeiro ilha 2", "text"],
        ["enfermeiro_ilha_3", "Enfermeiro ilha 3", "text"],
        ["adm_ilha_1", "ADM ilha 1", "text"],
        ["adm_ilha_2", "ADM ilha 2", "text"],
        ["adm_ilha_3", "ADM ilha 3", "text"],
        ["coordenacao", "Coordenação", "text"],
        ["observacao", "Observação", "textarea"]
      ], row);
      openDrawer();
    }

    function renderFields(fields, row) {
      return `<div class="grid grid-2">${fields.map(field => renderField(field, row)).join("")}</div>`;
    }

    function renderField(field, row) {
      const [name, title, type, options] = field;
      const value = row && row[name] ? row[name] : "";
      const inputValue = type === "date" ? normalizeDateValue(value) : value;
      if (type === "textarea") {
        return `<div class="field" style="grid-column: 1 / -1;"><label>${esc(title)}</label><textarea class="textarea" name="${name}">${esc(value)}</textarea></div>`;
      }
      if (type === "select" || type === "select-status" || type === "select-specialty") {
        const opts = type === "select-status" ? getOptions().statuses : type === "select-specialty" ? getOptions().specialties : options;
        return `<div class="field"><label>${esc(title)}</label><select class="select" name="${name}">
          <option value=""></option>
          ${(opts || []).map(opt => `<option value="${esc(opt)}" ${String(value) === String(opt) ? "selected" : ""}>${esc(opt)}</option>`).join("")}
        </select></div>`;
      }
      return `<div class="field"><label>${esc(title)}</label><input class="input" type="${type}" name="${name}" value="${esc(inputValue)}"></div>`;
    }

    let drawerLastFocus = null;

    function openDrawer() {
      drawerLastFocus = document.activeElement;
      el.drawer.classList.add("open");
      el.drawer.setAttribute("aria-hidden", "false");
      const first = el.drawerBody.querySelector("input, select, textarea, button");
      if (first) setTimeout(() => first.focus(), 60);
    }

    function closeDrawer() {
      el.drawer.classList.remove("open");
      el.drawer.setAttribute("aria-hidden", "true");
      state.editing = null;
      if (drawerLastFocus && typeof drawerLastFocus.focus === "function") {
        drawerLastFocus.focus();
        drawerLastFocus = null;
      }
    }

    let pendingConfirmResolve = null;

    function askConfirm(options = {}) {
      if (pendingConfirmResolve) resolveConfirm(false);
      el.confirmTitle.textContent = options.title || "Confirmar ação";
      el.confirmMessage.textContent = options.message || "Deseja continuar?";
      el.confirmAccept.textContent = options.acceptLabel || "Confirmar";
      el.confirmAccept.classList.toggle("btn-danger", options.danger !== false);
      el.confirmModal.classList.add("open");
      el.confirmModal.setAttribute("aria-hidden", "false");
      el.confirmAccept.focus();
      return new Promise(resolve => {
        pendingConfirmResolve = resolve;
      });
    }

    function resolveConfirm(value) {
      if (!pendingConfirmResolve) return;
      const resolve = pendingConfirmResolve;
      pendingConfirmResolve = null;
      el.confirmModal.classList.remove("open");
      el.confirmModal.setAttribute("aria-hidden", "true");
      resolve(!!value);
    }

    async function submitDrawer(event) {
      event.preventDefault();
      if (!state.editing || state.saving) return;
      const formData = new FormData(el.drawerForm);
      const data = Object.fromEntries(formData.entries());
      if (state.editing.row && state.editing.row.id) data.id = state.editing.row.id;

      const saveBtn = el.drawerForm.querySelector('[type="submit"]');
      const isShift = state.editing.type === "shift";
      const editedModuleKey = state.editing.moduleKey;
      state.saving = true;
      if (saveBtn) { saveBtn.textContent = "Salvando…"; saveBtn.disabled = true; }
      try {
        const res = isShift
          ? await server(state.app && state.app.activeShift ? "updateShift" : "startShift", data)
          : await server("saveRecord", { module: state.editing.moduleKey, record: data });
        if (!res.ok) return toast(res.error.message || "Erro ao salvar.", "danger");
        closeDrawer();
        clearModuleCache(isShift ? null : editedModuleKey);
        toast(isShift ? "Plantão salvo." : "Registro salvo.", "ok");
        await loadState();
      } finally {
        state.saving = false;
        if (saveBtn) { saveBtn.textContent = "Salvar"; saveBtn.disabled = false; }
      }
    }

    async function closeShift() {
      if (!state.app || !state.app.activeShift) return toast("Nenhum plantão ativo.");
      if (state.saving) return;
      const ok = await askConfirm({
        title: "Encerrar plantão",
        message: "O plantão ativo será encerrado e um snapshot leve será salvo. O relatório detalhado continua disponível na aba Relatório.",
        acceptLabel: "Encerrar plantão"
      });
      if (!ok) return;
      const btn = document.getElementById("btnCloseShift");
      state.saving = true;
      if (btn) { btn.textContent = "Encerrando…"; btn.disabled = true; }
      try {
        const res = await server("closeShift", { filters: compactFilters() });
        if (!res.ok) return toast(res.error.message || "Erro ao encerrar.", "danger");
        state.report = res.data.report;
        clearModuleCache();
        toast("Plantão encerrado e relatório salvo.", "ok");
        await loadState();
      } finally {
        state.saving = false;
        if (btn) { btn.textContent = "Encerrar"; btn.disabled = false; }
      }
    }

    function compactFilters() {
      const f = Object.assign({}, state.filters);
      Object.keys(f).forEach(key => {
        if (f[key] === "" || f[key] === null || f[key] === undefined) delete f[key];
      });
      return f;
    }

    function getOptions() {
      return state.app && state.app.options ? state.app.options : DEFAULT_OPTIONS;
    }

    function label(key) {
      return key
        .replace(/_/g, " ")
        .replace(/\b\w/g, s => s.toUpperCase())
        .replace("Uib", "UIB")
        .replace("Srpa", "SRPA");
    }

    function formatCell(key, value) {
      if (!value) return "";
      if (key === "status" || key === "status_leito" || key === "tipo_bloqueio") {
        const type = /NEGADO|CANCELADO|BLOQUEADO/.test(value) ? "danger" : /RESERV|PENDENTE|AGUARDA|FALTA/.test(value) ? "warn" : /INTERNADO|CONCLUIDO|REALIZADO|LIVRE/.test(value) ? "ok" : "info";
        return `<span class="tag ${type}">${esc(value)}</span>`;
      }
      if (isDateOnlyKey(key)) return esc(formatDateBr(value));
      return esc(value);
    }

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function toast(message, type = "") {
      el.toast.textContent = message;
      el.toast.classList.remove("ok", "danger", "info");
      if (type) el.toast.classList.add(type);
      el.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.toast.classList.remove("show"), 2600);
    }

    function server(fn, payload) {
      if (hasAppsScript) {
        return new Promise(resolve => {
          let done = false;
          const finish = value => { if (!done) { done = true; resolve(value); } };
          const timer = setTimeout(() => finish({ ok: false, error: { message: "Tempo de resposta excedido. Tente novamente." } }), 30000);
          google.script.run
            .withSuccessHandler(value => { clearTimeout(timer); finish(value); })
            .withFailureHandler(error => { clearTimeout(timer); finish({ ok: false, error: { message: error.message || String(error) } }); })
            [fn](payload || {});
        });
      }
      return Promise.resolve(mockServer(fn, payload || {}));
    }

    function mockServer(fn, payload) {
      const store = getStore();
      const api = {
        getAppState() {
          return { ok: true, data: buildMockState(store, payload.filters || {}) };
        },
        listRecords() {
          return { ok: true, data: { module: payload.module, rows: filterMock(store[payload.module] || [], payload.filters || {}) } };
        },
        startShift() {
          store.activeShift = Object.assign({ id: "PLT-DEMO", status: "ABERTO", aberto_em: new Date().toISOString() }, payload);
          saveStore(store);
          return { ok: true, data: { activeShift: store.activeShift } };
        },
        updateShift() {
          store.activeShift = Object.assign({}, store.activeShift || {}, payload);
          saveStore(store);
          return { ok: true, data: { activeShift: store.activeShift } };
        },
        closeShift() {
          const report = buildMockReport(store, payload.filters || {});
          store.reports.push(report);
          store.activeShift = null;
          saveStore(store);
          return { ok: true, data: { activeShift: null, report } };
        },
        saveRecord() {
          const list = store[payload.module] || [];
          const record = normalizeDemoRecord(payload.module, Object.assign({}, payload.record));
          const isNew = !record.id;
          record.id = record.id || `${payload.module.toUpperCase()}-${Math.random().toString(16).slice(2, 8).toUpperCase()}`;
          record.updated_at = new Date().toISOString();
          const index = list.findIndex(item => item.id === record.id);
          if (index >= 0) list[index] = Object.assign({}, list[index], record);
          else list.push(record);
          store[payload.module] = list;
          mockLog(store, payload.module, isNew ? "REGISTRO_CRIADO" : "REGISTRO_ATUALIZADO", record.id);
          saveStore(store);
          return { ok: true, data: { record } };
        },
        deleteRecord() {
          const list = store[payload.module] || [];
          const item = list.find(r => r.id === payload.id);
          if (item) {
            if (isProtectedArchive(payload.module, item)) {
              return { ok: false, error: { message: "Este registro ainda esta em acompanhamento. Marque um desfecho claro antes de arquivar." } };
            }
            item.deleted_at = new Date().toISOString();
            mockLog(store, payload.module, "REGISTRO_ARQUIVADO", payload.id);
            saveStore(store);
          }
          return { ok: true, data: { deleted: !!item } };
        },
        listLog() {
          const rows = (store.log || []).slice().reverse().slice(0, payload.limit || 100);
          return { ok: true, data: { rows, total: (store.log || []).length } };
        },
        generateReport() {
          return { ok: true, data: buildMockReport(store, payload.filters || {}) };
        }
      };
      return api[fn] ? api[fn]() : { ok: false, error: { message: `Função não encontrada: ${fn}` } };
    }

    function mockLog(store, moduleKey, action, recordId) {
      store.log = store.log || [];
      store.log.push({
        id: `LOG-${Math.random().toString(16).slice(2, 8).toUpperCase()}`,
        data_hora: new Date().toISOString(),
        usuario: "modo-demo@local",
        plantao_id: store.activeShift ? store.activeShift.id : "",
        modulo: moduleKey,
        acao: action,
        registro_id: recordId || ""
      });
    }

    function getStore() {
      const raw = localStorage.getItem("nir-demo-store");
      if (raw) return JSON.parse(raw);
      const store = demoStore();
      saveStore(store);
      return store;
    }

    function saveStore(store) {
      localStorage.setItem("nir-demo-store", JSON.stringify(store));
    }

    function demoStore() {
      return {
        activeShift: {
          id: "PLT-DEMO",
          data: today(),
          turno: "MT",
          status: "ABERTO",
          medico_ilha_1: "Dra. Exemplo A",

        },
        reports: [],
        regulations: [
          { id: "REG-001", origem_regulacao: "CRL", fastmedic: "FM-DEMO-001", paciente_alias: "Paciente 001", data_solicitacao: today(), turno: "MT", ads: "ADS Fortaleza", municipio: "Fortaleza", unidade_origem: "Hospital de Origem A", especialidade: "Obstetricia", status: "RESERVA_CONFIRMADA", avaliado_por: "Dr. Exemplo B", justificativa: "Não se aplica", observacao: "Aguardar chegada e confirmar leito.", reservado_em: new Date().toISOString(), prioridade: "alta" },
          { id: "REG-002", origem_regulacao: "SAMU", fastmedic: "FM-DEMO-002", paciente_alias: "Paciente 002", data_solicitacao: today(), turno: "MT", ads: "ADS Sertão", municipio: "Município B", unidade_origem: "UPA Exemplo", especialidade: "Cirurgia Vascular", status: "NEGADO", avaliado_por: "Dra. Exemplo A", justificativa: "Dentro do perfil, mas sem vagas", observacao: "Manter em tela para reavaliação.", prioridade: "media" },
          { id: "REG-003", origem_regulacao: "LOCAL", fastmedic: "FM-DEMO-003", paciente_alias: "Paciente 003", data_solicitacao: today(), turno: "SN", municipio: "Fortaleza", unidade_origem: "Ambulatório", especialidade: "Oncologia Clinica", status: "INTERNADO", avaliado_por: "Dr. Exemplo C", justificativa: "Não se aplica", observacao: "Internação local concluída." }
        ],
        beds: [
          { id: "BED-001", unidade: "UIB Vascular", leito: "L01", status_leito: "INTERNADO", paciente_alias: "Paciente 004", data_internacao: today(), especialidade_origem: "Cirurgia Vascular", especialidade_destino: "Cirurgia Vascular", isolamento: "", pendencia: "Aguardar procedimento", permanencia_dias: 2 },
          { id: "BED-002", unidade: "UIB Onco/Hemato", leito: "L04", status_leito: "RESERVADO", paciente_alias: "Paciente 005", especialidade_destino: "Oncologia Clinica", pendencia: "Falta chegar no leito", permanencia_dias: 0 }
        ],
        procedures: [
          { id: "PROC-001", tipo: "Imagem", paciente_alias: "Paciente 006", fastmedic: "FM-DEMO-006", origem: "Hospital Externo", apto_medico: "SIM", avaliado_por: "Dra. Exemplo A", agendado_por: "Adm. Exemplo", procedimento: "TC de crânio", data_programacao: today(), hora_programacao: "08:00", status: "AGENDADO", observacao: "Com sedação." }
        ],
        icu: [
          { id: "UTI-001", tipo: "ALTA_UTI_AGUARDANDO_LEITO", prontuario: "PR-DEMO-001", paciente_alias: "Paciente 007", leito_atual: "UTI Adulto II", especialidade: "Cirurgia Geral", status: "ALTA_24H", observacao: "Aguardando leito de enfermaria." },
          { id: "UTI-002", tipo: "SRPA_AGUARDANDO_LEITO", paciente_alias: "Paciente 008", leito_atual: "SRPA", especialidade: "Cirurgia Vascular", status: "AGUARDA", destino: "UIB Vascular" }
        ],
        blocks: [
          { id: "BLQ-001", tipo_bloqueio: "MANUTENCAO", unidade: "Ala B", leito: "B511.01", motivo: "Manutenção predial", data_inicio: today(), status: "ABERTO", observacao: "Acompanhar reparo." }
        ]
      };
    }

    function buildMockState(store, filters) {
      const regulations = filterMock(store.regulations, filters);
      const beds = filterMock(store.beds, filters);
      const procedures = filterMock(store.procedures, filters);
      const icu = filterMock(store.icu, filters);
      const blocks = filterMock(store.blocks, filters);
      return {
        activeShift: store.activeShift,
        options: DEFAULT_OPTIONS,
        generatedAt: new Date().toISOString(),
        user: { email: "modo-demo@local" },
        dashboard: {
          kpis: kpis(regulations, beds, procedures, icu, blocks),
          bySpecialty: group(regulations, "especialidade"),
          byStatus: group(regulations, "status"),
          byOrigin: group(regulations, "origem_regulacao"),
          latestRegulations: regulations.slice().reverse(),
          pendingBeds: beds.filter(row => row.status_leito !== "LIVRE"),
          pendingProcedures: procedures.filter(row => !isFinal(row.status)),
          icu,
          blocks
        }
      };
    }

    function buildMockReport(store, filters) {
      const app = buildMockState(store, filters);
      const d = app.dashboard;
      const only = filters.reportModule || "";
      const show = key => !only || only === key;
      const lines = [
        "RELATORIO DE PASSAGEM DE PLANTAO - NIR",
        `Gerado em: ${new Date().toLocaleString("pt-BR")}`,
        ...(only ? [`Modulo: ${only}`] : []),
        "",
        "RESUMO",
        `- Regulacoes no filtro: ${d.kpis.regulacoes}`,
        `- Reservados: ${d.kpis.reservados} | Internados: ${d.kpis.internados} | Negados: ${d.kpis.negados} | Cancelados: ${d.kpis.cancelados}`,
        `- Pendencias abertas: ${d.kpis.pendentes} | Procedimentos pendentes: ${d.kpis.procedimentos_pendentes}`,
        `- Leitos ocupados/reservados em UIB: ${d.kpis.leitos_ocupados_ou_reservados} | Bloqueios abertos: ${d.kpis.bloqueios_abertos}`
      ];
      if (show("regulations")) {
        lines.push("", "PENDENCIAS DE REGULACAO",
          ...filterMock(store.regulations, filters).filter(row => !isFinal(row.status)).map(row => `- ${row.paciente_alias || row.fastmedic} | ${row.especialidade || "-"} | ${row.status || "-"} | ${row.observacao || ""}`));
      }
      if (show("beds")) {
        lines.push("", "UIB / LEITOS",
          ...filterMock(store.beds, filters).map(row => `- ${row.unidade || "-"} ${row.leito || "-"} | ${row.paciente_alias || "-"} | ${row.status_leito || "-"} | ${row.pendencia || ""}`));
      }
      if (show("procedures")) {
        lines.push("", "PROCEDIMENTOS E EXAMES",
          ...filterMock(store.procedures, filters).filter(row => !isFinal(row.status)).map(row => `- ${row.tipo || "-"} | ${row.paciente_alias || "-"} | ${row.procedimento || "-"} | ${row.data_programacao || "-"} ${row.hora_programacao || ""} | ${row.status || "-"}`));
      }
      if (show("icu")) {
        lines.push("", "UTI / SRPA",
          ...filterMock(store.icu, filters).map(row => `- ${row.tipo || "-"} | ${row.paciente_alias || "-"} | ${row.leito_atual || "-"} -> ${row.destino || "-"} | ${row.status || "-"}`));
      }
      if (show("blocks")) {
        lines.push("", "BLOQUEIOS",
          ...filterMock(store.blocks, filters).filter(row => row.status !== "ENCERRADO").map(row => `- ${row.tipo_bloqueio || "-"} | ${row.unidade || "-"} ${row.leito || "-"} | ${row.motivo || row.observacao || ""}`));
      }
      return {
        id: "REL-DEMO",
        text: lines.join("\n"),
        kpis: d.kpis,
        generatedAt: new Date().toISOString(),
        plantao_id: store.activeShift ? store.activeShift.id : "",
        filters: filters,
        sections: {
          resumo: [],
          regulacoes: filterMock(store.regulations, filters),
          leitos: filterMock(store.beds, filters),
          procedimentos: filterMock(store.procedures, filters),
          uti: filterMock(store.icu, filters),
          bloqueios: filterMock(store.blocks, filters),
          especialidades: d.bySpecialty,
          status: d.byStatus
        }
      };
    }

    function filterMock(rows, filters) {
      const f = filters || {};
      const term = (f.search || "").toLowerCase();
      return (rows || []).filter(row => {
        if (row.deleted_at) return false;
        if (f.turno && f.turno !== "TODOS" && row.turno && row.turno !== f.turno) return false;
        if (f.onlyPending && isFinal(row.status || row.status_leito || row.desfecho)) return false;
        if (term && JSON.stringify(row).toLowerCase().indexOf(term) === -1) return false;
        if (f.dateFrom || f.dateTo) {
          const date = row.data_solicitacao || row.data_programacao || row.data_internacao || row.data_inicio || "";
          if (f.dateFrom && date < f.dateFrom) return false;
          if (f.dateTo && date > f.dateTo) return false;
        }
        return true;
      });
    }

    function kpis(regulations, beds, procedures, icu, blocks) {
      return {
        regulacoes: regulations.length,
        reservados: regulations.filter(r => ["RESERVADO", "RESERVA_CONFIRMADA"].includes(r.status)).length,
        internados: regulations.filter(r => r.status === "INTERNADO").length,
        negados: regulations.filter(r => r.status === "NEGADO").length,
        cancelados: regulations.filter(r => r.status === "CANCELADO").length,
        pendentes: regulations.filter(r => !isFinal(r.status)).length,
        leitos_ocupados_ou_reservados: beds.filter(r => r.status_leito !== "LIVRE").length,
        procedimentos_pendentes: procedures.filter(r => !isFinal(r.status)).length,
        altas_uti_aguardando_leito: icu.filter(r => r.tipo === "ALTA_UTI_AGUARDANDO_LEITO").length,
        bloqueios_abertos: blocks.filter(r => r.status !== "ENCERRADO").length,
        tempo_medio_reserva_horas: avgHours(regulations, "vaga_dada_em", "reservado_em"),
        tempo_medio_chegada_horas: avgHours(regulations, "reservado_em", "chegou_em"),
        permanencia_media_dias: avgNumber(beds, "permanencia_dias")
      };
    }

    function avgHours(rows, startKey, endKey) {
      const values = (rows || []).map(row => {
        const start = new Date(String(row[startKey] || "").replace(" ", "T"));
        const end = new Date(String(row[endKey] || "").replace(" ", "T"));
        if (isNaN(start) || isNaN(end)) return null;
        return (end.getTime() - start.getTime()) / 36e5;
      }).filter(v => v !== null && !isNaN(v) && v >= 0);
      if (!values.length) return 0;
      return Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 10) / 10;
    }

    function avgNumber(rows, key) {
      const values = (rows || []).map(row => Number(row[key])).filter(v => !isNaN(v));
      if (!values.length) return 0;
      return Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 10) / 10;
    }

    function group(rows, key) {
      const map = {};
      rows.forEach(row => {
        const label = row[key] || "Não informado";
        map[label] = (map[label] || 0) + 1;
      });
      return Object.keys(map).map(label => ({ label, count: map[label] })).sort((a, b) => b.count - a.count);
    }

    function normalizeDemoRecord(moduleKey, record) {
      const now = new Date().toISOString();
      if (moduleKey === "regulations") {
        const status = String(record.status || "").toUpperCase().replace(/\s+/g, "_");
        if (["RESERVADO_CONFIRMADO", "CONFIRMADO", "RESERVA_CONFIRMADA"].includes(status)) record.status = "RESERVA_CONFIRMADA";
        if (record.status === "RESERVA_CONFIRMADA" && !record.reservado_em) record.reservado_em = now;
        if (record.status === "FALTA_CHEGAR" && !record.reservado_em) record.reservado_em = now;
        if (record.status === "INTERNADO" && !record.internado_em) record.internado_em = now;
        if (["CANCELADO", "NEGADO"].includes(record.status) && !record.cancelado_em) record.cancelado_em = now;
      }
      if (moduleKey === "procedures" && !record.status) record.status = "PENDENTE";
      if (moduleKey === "blocks" && !record.status) record.status = "ABERTO";
      return record;
    }

    function isProtectedArchive(moduleKey, row) {
      if (!row) return false;
      if (moduleKey === "regulations") return !!row.status && !isFinal(row.status);
      if (moduleKey === "procedures") return !!row.status && !isFinal(row.status);
      if (moduleKey === "beds") return row.status_leito && row.status_leito !== "LIVRE" && !isFinal(row.desfecho);
      if (moduleKey === "icu") return !!row.status && !isFinal(row.status);
      if (moduleKey === "blocks") return row.status && row.status !== "ENCERRADO";
      return false;
    }

    function isFinal(status) {
      return ["INTERNADO", "NEGADO", "CANCELADO", "CONCLUIDO", "REALIZADO", "ALTA", "OBITO", "TRANSFERIDO"].includes(String(status || "").toUpperCase());
    }
  </script>
