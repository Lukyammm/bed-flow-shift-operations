<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NIR - Passagem de Plantão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7f9;
      --surface: #ffffff;
      --surface-2: #eef3f5;
      --line: #d8e0e5;
      --line-strong: #b8c4cc;
      --text: #17212b;
      --muted: #607080;
      --primary: #0f766e;
      --primary-ink: #ffffff;
      --info: #1d4ed8;
      --warn: #b45309;
      --danger: #be123c;
      --ok: #15803d;
      --shadow: 0 8px 22px rgba(23, 33, 43, 0.08);
      --radius: 8px;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-size: 14px;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .sidebar {
      background: #101820;
      color: #edf4f7;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 4px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.16);
    }

    .brand strong {
      font-size: 18px;
    }

    .brand span {
      color: #aab8c2;
      font-size: 12px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav button {
      border: 1px solid transparent;
      background: transparent;
      color: #dce8ed;
      border-radius: var(--radius);
      text-align: left;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 8px;
      position: relative;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }

    .nav button:hover,
    .nav button.active {
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
    }

    .nav button.active {
      color: #ffffff;
    }

    .nav button.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: 999px;
      background: #2dd4bf;
    }

    .nav button > span:first-child {
      color: #6fd3c7;
      font-size: 15px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
    }

    .nav button svg { display: block; }

    .side-note {
      margin-top: auto;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: var(--radius);
      padding: 12px;
      color: #b9c9d1;
      line-height: 1.4;
      font-size: 12px;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: rgba(255,255,255,0.94);
      border-bottom: 1px solid var(--line);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(12px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
    }

    .topbar small {
      color: var(--muted);
    }

    .topbar-title {
      min-width: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #e8f5f2;
      color: #075b52;
      border: 1px solid #b8ddd5;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-pill.closed {
      background: #f2f4f5;
      border-color: var(--line);
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .content {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .surface {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .surface-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .surface-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .surface-title h2 {
      margin: 0;
      font-size: 16px;
    }

    .surface-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .surface-body {
      padding: 16px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid > *,
    .split > * {
      min-width: 0;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fbfcfd;
      min-height: 86px;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .stat:hover {
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      display: block;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
    }

    .stat small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
    }

    .filter-band {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--text);
      border-radius: var(--radius);
      padding: 9px 10px;
      min-height: 38px;
    }

    .textarea {
      min-height: 92px;
      resize: vertical;
    }

    .input:focus, .select:focus, .textarea:focus {
      outline: 3px solid rgba(15, 118, 110, 0.18);
      border-color: var(--primary);
    }

    .btn {
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--text);
      border-radius: var(--radius);
      padding: 9px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 38px;
      font-weight: 700;
      white-space: nowrap;
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .04s ease;
    }

    .btn:hover {
      border-color: #7c8a95;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary:hover { background: #0c5f59; border-color: #0c5f59; }
    .btn-danger:hover { background: #a10e34; border-color: #a10e34; }

    .btn:disabled,
    .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn:disabled:hover,
    .btn[disabled]:hover {
      border-color: var(--line-strong);
    }

    .btn:focus-visible,
    .nav button:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.5);
      outline-offset: 2px;
    }

    .nav button:focus-visible {
      outline-color: rgba(255, 255, 255, 0.65);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primary-ink);
      border-color: var(--primary);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
    }

    .btn-small {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .btn-icon:hover {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--line-strong);
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      background: #fff;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f5;
      color: #33424f;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr:hover td {
      background: #f9fbfc;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
      background: #fff;
      white-space: nowrap;
    }

    .tag.ok { color: var(--ok); border-color: #bfe2ca; background: #f0fbf3; }
    .tag.warn { color: var(--warn); border-color: #f2d2a8; background: #fff8ed; }
    .tag.danger { color: var(--danger); border-color: #f2bbc8; background: #fff1f4; }
    .tag.info { color: var(--info); border-color: #bfd0fb; background: #f0f5ff; }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(360px, 0.7fr);
      gap: 14px;
      align-items: start;
    }

    .chart-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bar-line {
      display: grid;
      grid-template-columns: minmax(110px, 180px) 1fr 42px;
      gap: 8px;
      align-items: center;
    }

    .bar-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #33424f;
    }

    .bar-track {
      height: 10px;
      background: #e6edf1;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: inherit;
    }

    .filter-band .toolbar {
      min-width: 0;
    }

    .report-preview {
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #fbfcfd;
      min-height: 420px;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    /* ----- Relatorio formatado (rich) ----- */
    .report-doc {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .report-doc .doc-hero {
      background: linear-gradient(135deg, #0f766e 0%, #115e59 100%);
      color: #fff;
      padding: 22px 24px;
    }

    .report-doc .doc-hero h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: .2px;
    }

    .report-doc .doc-hero .doc-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .report-doc .doc-hero .doc-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 12px;
    }

    .report-doc .doc-body {
      padding: 20px 24px 24px;
    }

    .report-doc .doc-empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }

    .report-section { margin-top: 26px; }
    .report-section:first-child { margin-top: 0; }

    .report-section > h3 {
      margin: 0 0 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .report-section > h3 .count-pill {
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--muted);
      background: var(--surface-2);
      border-radius: 999px;
      padding: 1px 9px;
    }

    .report-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }

    .report-kpi {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      background: #fbfcfd;
      border-left: 3px solid var(--line-strong);
    }

    .report-kpi.is-warn { border-left-color: var(--warn); }
    .report-kpi.is-danger { border-left-color: var(--danger); }
    .report-kpi.is-ok { border-left-color: var(--ok); }
    .report-kpi.is-info { border-left-color: var(--info); }

    .report-kpi span {
      display: block;
      color: var(--muted);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .report-kpi strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      line-height: 1;
    }

    .report-kpi small {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
    }

    .report-dist {
      display: grid;
      gap: 7px;
    }

    .report-dist .dist-line {
      display: grid;
      grid-template-columns: minmax(120px, 180px) 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .report-dist .dist-track {
      height: 9px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .report-dist .dist-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary);
    }

    .report-dist .dist-line strong { font-variant-numeric: tabular-nums; }

    .report-doc table { min-width: 0; }
    .report-doc .table-wrap { border-radius: var(--radius); }

    .report-twocol {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 26px;
    }

    @media (max-width: 900px) {
      .report-twocol { grid-template-columns: 1fr; }
    }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 20;
      visibility: hidden;
      transition: visibility 0s linear .25s;
    }

    .drawer.open {
      visibility: visible;
      transition-delay: 0s;
    }

    .drawer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 15, 20, 0.42);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .drawer.open .drawer-backdrop {
      opacity: 1;
    }

    .drawer-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: min(720px, 100%);
      height: 100%;
      background: var(--surface);
      box-shadow: -10px 0 30px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .25s ease;
    }

    .drawer.open .drawer-panel {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .drawer-body {
      padding: 16px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }

    .drawer-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .confirm-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, visibility 0s linear .18s;
    }

    .confirm-modal.open {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      transition: opacity .18s ease;
    }

    .confirm-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(10, 15, 20, 0.46);
    }

    .confirm-panel {
      position: relative;
      width: min(440px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 14px;
      transform: translateY(8px) scale(0.98);
      transition: transform .18s ease;
    }

    .confirm-modal.open .confirm-panel {
      transform: none;
    }

    .confirm-panel h2 {
      margin: 0;
      font-size: 17px;
    }

    .confirm-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      padding: 24px;
      color: var(--muted);
      background: #fbfcfd;
      text-align: center;
    }

    .hidden { display: none !important; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(10px);
      background: #101820;
      color: #fff;
      border-radius: var(--radius);
      padding: 10px 14px 10px 16px;
      box-shadow: var(--shadow);
      border-left: 4px solid #475569;
      max-width: min(440px, calc(100% - 32px));
      z-index: 50;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease, visibility 0s linear .2s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.ok { border-left-color: #34d399; }
    .toast.danger { border-left-color: #fb7185; }
    .toast.info { border-left-color: #60a5fa; }

    @media (max-width: 1100px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
      }
      .nav {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .side-note { display: none; }
      .stat-row, .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filter-band { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
      .topbar .toolbar {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .topbar .status-pill {
        grid-column: 1 / -1;
        justify-content: center;
      }
      .topbar .toolbar .btn {
        width: 100%;
      }
      #btnCloseShift {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .content { padding: 14px; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat-row, .grid-2, .grid-3, .grid-4, .filter-band { grid-template-columns: 1fr; }
      .filter-band .toolbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .filter-band .toolbar .btn {
        width: 100%;
      }
      .bar-line { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media print {
      .sidebar, .topbar, .filter-band, .surface-header .toolbar, .drawer, .confirm-modal, .toast { display: none !important; }
      .app-shell { display: block; }
      .content { padding: 0; }
      .surface { box-shadow: none; border: none; }
      .report-preview { border: none; font-size: 12px; }
      .report-doc { border: none; }
      .report-doc .doc-hero,
      .report-kpi, .report-dist .dist-fill, .report-dist .dist-track {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .report-section { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>NIR</strong>

        fields: [
          ["tipo", "Tipo", "select", ["PEDIDO_UTI", "SRPA_AGUARDANDO_LEITO", "ALTA_UTI_AGUARDANDO_LEITO", "ALTA_UTI_COM_LEITO"]],

      },
      blocks: {

        server: "blocks",
        columns: ["tipo_bloqueio", "unidade", "leito", "paciente_alias", "motivo", "data_inicio", "previsao", "status", "observacao"],
        fields: [
          ["tipo_bloqueio", "Tipo", "select", ["MANUTENCAO", "ISOLAMENTO", "ECTOPICO", "RESERVA_TECNICA"]],
          ["unidade", "Unidade", "text"],

          ["paciente_alias", "Identificação segura", "text"],

    const DEFAULT_OPTIONS = {
      statuses: ["NOVO", "EM_AVALIACAO", "AGUARDANDO_REGULACAO", "RESERVADO", "FALTA_CHEGAR", "INTERNADO", "NEGADO", "CANCELADO", "AGENDADO", "REAGENDADO", "REALIZADO", "CONCLUIDO", "PENDENTE", "LIVRE", "BLOQUEADO", "ALTA_24H", "AGUARDA_LEITO"],
      specialties: ["Clinica Medica", "Geriatria", "Reumatologia", "Pneumologia", "Hematologia", "Oncologia Clinica", "Cirurgia Oncologica", "Cirurgia Geral", "Coloproctologia", "Cirurgia Digestiva", "Cirurgia Ginecologica", "Cabeca e Pescoco", "Cirurgia Vascular", "Urologia", "Ortopedia", "Obstetricia", "UCINCO", "UTI Neonatal", "UTI Adulto", "Cardiopediatria", "Cirurgia Toracica", "Exame", "Hemodialise", "SAD/EMAD/CCC"],
      origins: ["CRL", "SAMU", "LOCAL", "SIREG", "AMBULATORIO"]
    };

    const state = {
      view: "dashboard",
      app: null,
      saving: false,
      renderToken: 0,
      filters: {
        dateFrom: "",
        dateTo: "",
        turno: "TODOS",
        search: "",
        onlyPending: false
      },
      tableRows: {},
      moduleCache: {},
      moduleRequests: {},
      auditLogRows: [],
      auditLogRequest: null,
      archivedRecords: [],
      archivedRecordsRequest: null,
      reportGenerating: false,
      reportRequest: null,
      report: null,
      reportRaw: false,
      editing: null
    };

    const el = {
      nav: document.getElementById("nav"),
      content: document.getElementById("content"),
      pageTitle: document.getElementById("pageTitle"),
      pageSubtitle: document.getElementById("pageSubtitle"),
      shiftBadge: document.getElementById("shiftBadge"),
      toast: document.getElementById("toast"),
      drawer: document.getElementById("drawer"),
      drawerTitle: document.getElementById("drawerTitle"),
      drawerSubtitle: document.getElementById("drawerSubtitle"),
      drawerBody: document.getElementById("drawerBody"),
      drawerForm: document.getElementById("drawerForm"),
      confirmModal: document.getElementById("confirmModal"),
      confirmTitle: document.getElementById("confirmTitle"),
      confirmMessage: document.getElementById("confirmMessage"),
      confirmCancel: document.getElementById("confirmCancel"),
      confirmAccept: document.getElementById("confirmAccept")
    };

    init();

    function init() {
      renderNav();
      bindGlobalActions();
      loadState();
    }

    function renderNav() {
      el.nav.innerHTML = NAV_ITEMS.map(([key, icon, label]) => `
        <button type="button" data-view="${key}" class="${state.view === key ? "active" : ""}" aria-current="${state.view === key ? "page" : "false"}">
          <span aria-hidden="true">${icon}</span><span>${label}</span>
        </button>
      `).join("");
      el.nav.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          if (state.view === button.dataset.view) return;
          state.view = button.dataset.view;
          render();
        });
      });
    }

    function setNavActive(viewKey) {
      el.nav.querySelectorAll("button").forEach(btn => {
        const isActive = btn.dataset.view === viewKey;
        btn.classList.toggle("active", isActive);
        btn.setAttribute("aria-current", isActive ? "page" : "false");
      });
    }

    function bindGlobalActions() {
      document.getElementById("btnRefresh").addEventListener("click", loadState);
      document.getElementById("btnOpenShift").addEventListener("click", () => openShiftDrawer());
      document.getElementById("btnCloseShift").addEventListener("click", closeShift);
      document.querySelectorAll("[data-close-drawer]").forEach(node => {
        node.addEventListener("click", closeDrawer);
      });
      document.querySelectorAll("[data-confirm-cancel]").forEach(node => {
        node.addEventListener("click", () => resolveConfirm(false));
      });
      el.confirmCancel.addEventListener("click", () => resolveConfirm(false));
      el.confirmAccept.addEventListener("click", () => resolveConfirm(true));
      el.drawerForm.addEventListener("submit", submitDrawer);
      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && el.drawer.classList.contains("open")) closeDrawer();
        if (event.key === "Escape" && el.confirmModal.classList.contains("open")) resolveConfirm(false);
        if (event.key === "Tab") trapFocus(event);
      });
    }

    function trapFocus(event) {
      const container = el.confirmModal.classList.contains("open")
        ? el.confirmModal.querySelector(".confirm-panel")
        : el.drawer.classList.contains("open")
          ? el.drawer.querySelector(".drawer-panel")
          : null;
      if (!container) return;
      const focusables = container.querySelectorAll(
        'a[href], button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
      );
      if (!focusables.length) return;
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    async function loadState() {
      const btn = document.getElementById("btnRefresh");
      if (btn) btn.textContent = "Aguarde…";
      const res = await server("getAppState", { filters: compactFilters() });
      if (btn) btn.textContent = "Atualizar";
      if (!res.ok) return toast(res.error.message || "Erro ao carregar.");
      state.app = res.data;
      updateShiftBadge();
      render();
    }

    function updateShiftBadge() {
      const shift = state.app && state.app.activeShift;
      if (!shift) {
        el.shiftBadge.classList.add("closed");
        el.shiftBadge.innerHTML = '<span class="status-dot"></span>Sem plantão ativo';
        return;
      }
      el.shiftBadge.classList.remove("closed");
      el.shiftBadge.innerHTML = `<span class="status-dot"></span>${formatDateBr(shift.data) || "-"} · ${shift.turno || "-"} · aberto`;
    }

    function render() {
      const view = state.view;
      const token = ++state.renderToken;
      const navItem = NAV_ITEMS.find(item => item[0] === view);
      el.pageTitle.textContent = navItem ? navItem[2] : "NIR";
      el.pageSubtitle.textContent = subtitleFor(view);
      setNavActive(view);

      if (!state.app) {
        el.content.innerHTML = '<div class="empty">Carregando...</div>';
        return;
      }

      if (view === "dashboard") renderDashboard();
      else if (view === "report") renderReport();
      else if (view === "audit") renderAudit(token);
      else renderModule(view, token);
    }

    function isStale(token) {
      return token !== undefined && token !== state.renderToken;
    }

    function contentLoading() {
      el.content.innerHTML = '<div class="empty" style="padding:40px;">Carregando…</div>';
    }

    function subtitleFor(view) {
      if (view === "dashboard") return "Leitura rápida do plantão e dos gargalos";
      if (view === "report") return "Gerador diário com filtros de troca de plantão";
      if (view === "audit") return "Histórico e governança operacional";
      return MODULES[view] ? MODULES[view].subtitle : "Núcleo Interno de Regulação";
    }

    function renderFilterBand(extra = "") {
      return `
        <section class="surface">
          <div class="surface-body">
            <div class="filter-band">
              <div class="field">
                <label>De</label>
                <input class="input" type="date" id="filterDateFrom" value="${esc(state.filters.dateFrom)}">
              </div>
              <div class="field">
                <label>Até</label>
                <input class="input" type="date" id="filterDateTo" value="${esc(state.filters.dateTo)}">
              </div>
              <div class="field">
                <label>Turno</label>
                <select class="select" id="filterTurno">
                  ${["TODOS", "MT", "SN"].map(v => `<option ${state.filters.turno === v ? "selected" : ""}>${v}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>Busca</label>
                <input class="input" type="search" id="filterSearch" value="${esc(state.filters.search)}" placeholder="nome seguro, fast, unidade...">
              </div>
              <div class="field">
                <label>Pendências</label>
                <select class="select" id="filterOnlyPending">
                  <option value="false" ${!state.filters.onlyPending ? "selected" : ""}>Todos</option>
                  <option value="true" ${state.filters.onlyPending ? "selected" : ""}>Só abertas</option>
                </select>
              </div>
              <div class="toolbar">
                <button class="btn btn-primary" id="btnApplyFilters" type="button">Filtrar</button>
                <button class="btn" id="btnClearFilters" type="button">Limpar</button>
              </div>
              ${extra}
            </div>
          </div>
        </section>
      `;
    }

    function bindFilters() {
      const apply = () => {
        state.filters.dateFrom = document.getElementById("filterDateFrom").value;
        state.filters.dateTo = document.getElementById("filterDateTo").value;
        state.filters.turno = document.getElementById("filterTurno").value;
        state.filters.search = document.getElementById("filterSearch").value;
        state.filters.onlyPending = document.getElementById("filterOnlyPending").value === "true";
        loadState();
      };
      document.getElementById("btnApplyFilters").addEventListener("click", apply);
      document.getElementById("filterSearch").addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          apply();
        }
      });
      document.getElementById("btnClearFilters").addEventListener("click", () => {
        state.filters = { dateFrom: "", dateTo: "", turno: "TODOS", search: "", onlyPending: false };
        loadState();
      });
    }

    function renderDashboard() {
      const d = state.app.dashboard;
      const k = d.kpis;
      el.content.innerHTML = `
        ${renderFilterBand()}
        <section class="stat-row">
          ${stat("Regulações", k.regulacoes, `${k.pendentes} pendentes`)}
          ${stat("Reservados", k.reservados, "acompanhar chegada")}
          ${stat("Internados", k.internados, "desfecho concluído")}
          ${stat("Bloqueios", k.bloqueios_abertos, "leitos indisponíveis")}
          ${stat("Altas UTI", k.altas_uti_aguardando_leito, "aguardando leito")}
        </section>
        <section class="grid grid-3">
          ${stat("Tempo médio até reserva", k.tempo_medio_reserva_horas || 0, "horas (vaga → reserva)")}
          ${stat("Tempo médio de chegada", k.tempo_medio_chegada_horas || 0, "horas (reserva → chegada)")}
          ${stat("Permanência média", k.permanencia_media_dias || 0, "dias em UIB")}
        </section>
        <section class="split">
          <div class="grid">
            ${renderChartSurface("Regulações por especialidade", d.bySpecialty)}
            ${renderTableSurface("Últimas regulações", d.latestRegulations, MODULES.regulations.columns, "regulations")}
          </div>
          <div class="grid">
            ${renderChartSurface("Status da regulação", d.byStatus)}
            ${renderTableSurface("UIB / leitos em atenção", d.pendingBeds, MODULES.beds.columns.slice(0, 7), "beds")}
          </div>
        </section>
      `;
      bindFilters();
      bindTableActions();
    }

    function stat(label, value, note) {
      return `<div class="stat"><span>${esc(label)}</span><strong>${Number(value || 0)}</strong><small>${esc(note || "")}</small></div>`;
    }

    function renderChartSurface(title, rows) {
      const max = Math.max(1, ...(rows || []).map(r => r.count));
      const body = rows && rows.length
        ? `<div class="chart-list">${rows.slice(0, 12).map(row => `
            <div class="bar-line">
              <div class="bar-label" title="${esc(row.label)}">${esc(row.label)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, row.count / max * 100)}%"></div></div>
              <strong>${row.count}</strong>
            </div>
          `).join("")}</div>`
        : `<div class="empty">Sem dados no filtro.</div>`;
      return `
        <section class="surface">
          <div class="surface-header"><div class="surface-title"><h2>${esc(title)}</h2><span>Contagem no filtro atual</span></div></div>
          <div class="surface-body">${body}</div>
        </section>
      `;
    }

    async function renderModule(moduleKey, token) {
      const meta = MODULES[moduleKey];
      const filters = compactFilters();
      const cacheKey = moduleCacheKey(moduleKey, filters);
      const cached = state.moduleCache[cacheKey];
      const previewRows = getModulePreviewRows(moduleKey);
      const initialRows = cached ? cached.rows : previewRows;

      renderModuleShell(moduleKey, initialRows, {
        loading: true,
        preview: !cached && previewRows.length > 0
      });

      if (!state.moduleRequests[cacheKey]) {
        state.moduleRequests[cacheKey] = server("listRecords", { module: meta.server, filters })
          .finally(() => { delete state.moduleRequests[cacheKey]; });
      }
      const res = await state.moduleRequests[cacheKey];
      if (isStale(token) || state.view !== moduleKey) return;

      const rows = res.ok ? res.data.rows : [];
      if (!res.ok) toast(res.error.message || "Erro ao carregar modulo.");
      if (res.ok) {
        state.moduleCache[cacheKey] = { rows, updatedAt: new Date().toISOString() };
      }
      renderModuleShell(moduleKey, rows, { loading: false });
    }

    function renderModuleShell(moduleKey, rows, options = {}) {
      const meta = MODULES[moduleKey];
      state.tableRows[moduleKey] = rows || [];
      el.content.innerHTML = `
        ${renderFilterBand()}
        ${renderTableSurface(meta.title, rows || [], meta.columns, moduleKey, true, options)}
      `;
      bindFilters();
      bindTableActions();
    }

    function getModulePreviewRows(moduleKey) {
      const dash = state.app && state.app.dashboard ? state.app.dashboard : {};
      const previews = {
        regulations: dash.latestRegulations,
        beds: dash.pendingBeds,
        procedures: dash.pendingProcedures,
        icu: dash.icu,
        blocks: dash.blocks
      };
      return (previews[moduleKey] || []).slice();
    }

    function moduleCacheKey(moduleKey, filters) {
      return `${moduleKey}:${stableStringify(filters || {})}`;
    }

    function stableStringify(value) {
      if (value === null || typeof value !== "object") return JSON.stringify(value);
      if (Array.isArray(value)) return `[${value.map(stableStringify).join(",")}]`;
      return `{${Object.keys(value).sort().map(key => `${JSON.stringify(key)}:${stableStringify(value[key])}`).join(",")}}`;
    }

    function clearModuleCache(moduleKey) {
      if (!moduleKey) {
        state.moduleCache = {};
        state.tableRows = {};
        return;
      }
      Object.keys(state.moduleCache).forEach(key => {
        if (key.startsWith(`${moduleKey}:`)) delete state.moduleCache[key];
      });
      delete state.tableRows[moduleKey];
    }

    async function renderModuleLegacy(moduleKey, token) {
      const meta = MODULES[moduleKey];
      contentLoading();
      const res = await server("listRecords", { module: meta.server, filters: compactFilters() });
      if (isStale(token) || state.view !== moduleKey) return;
      const rows = res.ok ? res.data.rows : [];
      if (!res.ok) toast(res.error.message || "Erro ao carregar módulo.");
      state.tableRows[moduleKey] = rows;
      el.content.innerHTML = `
        ${renderFilterBand()}
        ${renderTableSurface(meta.title, rows, meta.columns, moduleKey, true)}
      `;
      bindFilters();
      bindTableActions();
    }

    function renderTableSurface(title, rows, columns, moduleKey, includeAdd = false, options = {}) {
      const meta = MODULES[moduleKey];
      const addButton = includeAdd
        ? `<button class="btn" data-export="${moduleKey}" type="button" ${rows && rows.length ? "" : "disabled"}>Exportar CSV</button>
           <button class="btn btn-primary" data-add="${moduleKey}" type="button">Novo registro</button>`
        : "";
      const syncBadge = includeAdd && options.loading
        ? `<span class="tag info">${options.preview ? "Carregando lista completa..." : "Atualizando..."}</span>`
        : "";
      const body = rows && rows.length ? `
        <div class="table-wrap">
          <table>
            <thead><tr>${columns.map(c => `<th scope="col">${label(c)}</th>`).join("")}<th scope="col">Ações</th></tr></thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  ${columns.map(c => `<td>${formatCell(c, row[c])}</td>`).join("")}
                  <td style="white-space: nowrap;">
                    <button class="btn btn-small" data-edit="${moduleKey}" data-id="${esc(row.id)}" type="button">Editar</button>
                    ${includeAdd ? `<button class="btn btn-small btn-ghost" data-del="${moduleKey}" data-id="${esc(row.id)}" type="button" title="Arquivar registro">Arquivar</button>` : ""}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      ` : `<div class="empty">Sem registros neste filtro.</div>`;
      return `
        <section class="surface">
          <div class="surface-header">
            <div class="surface-title"><h2>${esc(title)}</h2><span>${esc(meta ? meta.subtitle : "Dados operacionais")}</span></div>
            <div class="toolbar">${syncBadge}${addButton}</div>
          </div>
          <div class="surface-body">${body}</div>
        </section>
      `;
    }

    function bindTableActions() {
      document.querySelectorAll("[data-add]").forEach(btn => {
        btn.addEventListener("click", () => openRecordDrawer(btn.dataset.add));
      });
      document.querySelectorAll("[data-edit]").forEach(btn => {
        btn.addEventListener("click", () => openRecordDrawer(btn.dataset.edit, findRow(btn.dataset.id)));
      });
      document.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", () => archiveRecord(btn.dataset.del, btn.dataset.id));
      });
      document.querySelectorAll("[data-export]").forEach(btn => {
        btn.addEventListener("click", () => exportModuleCsv(btn.dataset.export));
      });
    }

    function findRow(id) {
      const dash = state.app && state.app.dashboard ? state.app.dashboard : {};
      const dashboardRows = [].concat(
        dash.latestRegulations || [], dash.pendingBeds || [], dash.pendingProcedures || [],
        dash.icu || [], dash.blocks || []
      );
      const tableRows = Object.values(state.tableRows).reduce((all, list) => all.concat(list || []), []);
      return tableRows.find(r => r.id === id) || dashboardRows.find(r => r.id === id) || {};
    }

    async function archiveRecord(moduleKey, id) {
      if (!id) return;
      const ok = await askConfirm({
        title: "Arquivar registro",
        message: "Este registro sai das listas, mas continua salvo no histórico de auditoria.",
        acceptLabel: "Arquivar"
      });
      if (!ok) return;
      const meta = MODULES[moduleKey];
      const res = await server("deleteRecord", { module: meta.server, id });
      if (!res.ok) return toast(res.error.message || "Erro ao arquivar.", "danger");
      clearModuleCache(moduleKey);
      toast("Registro arquivado.", "ok");
      await loadState();
      if (state.view !== "dashboard") renderModule(state.view);
    }

    async function restoreArchivedRecord(moduleKey, id) {
      if (!id) return;
      const ok = await askConfirm({
        title: "Restaurar registro",
        message: "Este registro voltará às listas ativas.",
        acceptLabel: "Restaurar"
      });
      if (!ok) return;
      const res = await server("restoreRecord", { module: moduleKey, id });
      if (!res.ok) return toast(res.error.message || "Erro ao restaurar.", "danger");
      clearModuleCache(moduleKey);
      toast("Registro restaurado.", "ok");
      state.archivedRecordsRequest = null;
      await renderAudit(state.token);
    }

    function exportModuleCsv(moduleKey) {
      const meta = MODULES[moduleKey];
      const rows = state.tableRows[moduleKey] || [];
      if (!rows.length) return toast("Nada para exportar.");
      const cols = meta.columns;
      const head = cols.map(label).join(";");
      const body = rows.map(row => cols.map(c => csvCell(row[c])).join(";")).join("\n");
      const csv = "﻿" + head + "\n" + body;
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `nir-${moduleKey}-${today()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      toast("CSV exportado.");
    }

    function csvCell(value) {
      const text = String(value ?? "").replace(/"/g, '""');
      return /[";\n]/.test(text) ? `"${text}"` : text;
    }

    function renderReport() {
      const report = state.report;
      const isGenerating = state.reportGenerating;
      const hasReport = report && report.text;
      const body = hasReport
        ? (state.reportRaw
            ? `<div class="report-preview" id="reportPreview">${esc(report.text)}</div>`
            : renderReportDocument(report))
        : `<div class="report-doc"><div class="doc-empty">${isGenerating
            ? "Gerando relatório com os filtros atuais... A tela será atualizada automaticamente."
            : "Defina os filtros e clique em <strong>Gerar relatório</strong> para montar a passagem de plantão."}</div></div>`;
      el.content.innerHTML = `
        ${renderFilterBand(`
          <div class="field">
            <label>Módulo</label>
            <select class="select" id="reportModule">
              <option value="">Todos</option>
              ${Object.keys(MODULES).map(key => `<option value="${key}" ${state.filters.reportModule === key ? "selected" : ""}>${esc(MODULES[key].title)}</option>`).join("")}
            </select>
          </div>
        `)}
        <section class="surface">
          <div class="surface-header">
            <div class="surface-title">
              <h2>Relatório diário de troca de plantão</h2>
              <span>Gera resumo por filtros e mantém linguagem pronta para passagem</span>
            </div>
            <div class="toolbar">
              ${isGenerating ? '<span class="tag info">Gerando...</span>' : ""}
              <button class="btn btn-primary" id="btnGenerateReport" type="button" ${isGenerating ? "disabled" : ""}>${isGenerating ? "Gerando..." : "Gerar relatório"}</button>
              <button class="btn" id="btnToggleRaw" type="button" ${hasReport ? "" : "disabled"}>${state.reportRaw ? "Ver formatado" : "Ver texto"}</button>
              <button class="btn" id="btnCopyReport" type="button" ${hasReport ? "" : "disabled"}>Copiar texto</button>
              <button class="btn" id="btnPrintReport" type="button" ${hasReport ? "" : "disabled"}>Imprimir/PDF</button>
            </div>
          </div>
          <div class="surface-body">${body}</div>
        </section>
      `;
      bindFilters();
      document.getElementById("btnGenerateReport").addEventListener("click", generateReport);
      document.getElementById("btnCopyReport").addEventListener("click", copyReport);
      document.getElementById("btnPrintReport").addEventListener("click", () => window.print());
      const toggle = document.getElementById("btnToggleRaw");
      if (toggle) toggle.addEventListener("click", () => { state.reportRaw = !state.reportRaw; renderReport(); });
    }

    function renderReportDocument(report) {
      const only = report.filters && report.filters.reportModule ? report.filters.reportModule : "";
      const show = key => !only || only === key;
      const s = report.sections || {};
      const k = report.kpis || {};
      const num = v => Number(v || 0);

      const calendarIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
      const badgeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`;
      const searchIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
      const meta = [
        `<span>${calendarIcon} ${esc(formatDateTimeBr(report.generatedAt))}</span>`,
        report.plantao_id ? `<span>${badgeIcon} Plantão ${esc(formatShiftId(report.plantao_id))}</span>` : "",
        only ? `<span>${searchIcon} ${esc(MODULES[only] ? MODULES[only].title : only)}</span>` : `<span>${searchIcon} Todos os módulos</span>`
      ].filter(Boolean).join("");

      const kpis = [
        kpiCard("Regulações", num(k.regulacoes), `${num(k.pendentes)} pendentes`, num(k.pendentes) ? "info" : ""),
        kpiCard("Reservados", num(k.reservados), "acompanhar chegada", num(k.reservados) ? "warn" : ""),
        kpiCard("Internados", num(k.internados), "desfecho concluído", "ok"),
        kpiCard("Negados", num(k.negados), "fora de perfil/vaga", num(k.negados) ? "danger" : ""),
        kpiCard("Cancelados", num(k.cancelados), "regulações encerradas", ""),
        kpiCard("Proc. pendentes", num(k.procedimentos_pendentes), "exames e cirurgias", num(k.procedimentos_pendentes) ? "warn" : ""),
        kpiCard("Leitos UIB", num(k.leitos_ocupados_ou_reservados), "ocupados/reservados", ""),
        kpiCard("Bloqueios", num(k.bloqueios_abertos), "leitos indisponíveis", num(k.bloqueios_abertos) ? "danger" : ""),
        kpiCard("Altas UTI", num(k.altas_uti_aguardando_leito), "aguardando leito", num(k.altas_uti_aguardando_leito) ? "warn" : "")
      ].join("");

      const timeMetrics = [
        kpiCard("Tempo até reserva", num(k.tempo_medio_reserva_horas), "horas (vaga → reserva)", "info"),
        kpiCard("Tempo de chegada", num(k.tempo_medio_chegada_horas), "horas (reserva → chegada)", "info"),
        kpiCard("Permanência média", num(k.permanencia_media_dias), "dias em UIB", "info")
      ].join("");

      const sections = [];

      sections.push(reportSection("Visão geral", "", `<div class="report-kpi-grid">${kpis}</div>`));
      sections.push(reportSection("Indicadores de tempo", "", `<div class="report-kpi-grid">${timeMetrics}</div>`));

      if (show("regulations")) {
        sections.push(`
          <div class="report-twocol">
            ${reportSection("Regulações por status", "", distribution(s.status, true))}
            ${reportSection("Regulações por especialidade", "", distribution(s.especialidades, false))}
          </div>
        `);
        const pend = (s.regulacoes || []).filter(r => !isFinal(r.status)).slice(0, 40);
        sections.push(reportSection("Pendências de regulação", pend.length, reportTable(
          ["Paciente", "Especialidade", "Origem", "Status", "Observação"],
          pend.map(r => [
            patient(r), r.especialidade, r.unidade_origem || r.origem_regulacao,
            statusTag(r.status), r.observacao
          ])
        )));
      }

      if (show("beds")) {
        const rows = (s.leitos || []).filter(r => r.status_leito !== "LIVRE").slice(0, 40);
        sections.push(reportSection("UIB / Leitos", rows.length, reportTable(
          ["Unidade", "Leito", "Paciente", "Especialidade", "Status", "Pendência"],
          rows.map(r => [
            r.unidade, r.leito, patient(r), r.especialidade_destino || r.especialidade_origem,
            statusTag(r.status_leito), r.pendencia || r.observacao
          ])
        )));
      }

      if (show("procedures")) {
        const rows = (s.procedimentos || []).filter(r => !isFinal(r.status)).slice(0, 40);
        sections.push(reportSection("Procedimentos e exames", rows.length, reportTable(
          ["Tipo", "Paciente", "Procedimento", "Programação", "Status"],
          rows.map(r => [
            r.tipo, patient(r), r.procedimento,
            `${formatDateBr(r.data_programacao) || ""} ${r.hora_programacao || ""}`.trim(),
            statusTag(r.status)
          ])
        )));
      }

      if (show("icu")) {
        const rows = (s.uti || []).slice(0, 40);
        sections.push(reportSection("UTI / SRPA", rows.length, reportTable(
          ["Tipo", "Paciente", "Leito atual", "Destino", "Status"],
          rows.map(r => [r.tipo, patient(r), r.leito_atual, r.destino, statusTag(r.status)])
        )));
      }

      if (show("blocks")) {
        const rows = (s.bloqueios || []).filter(r => r.status !== "ENCERRADO").slice(0, 40);
        sections.push(reportSection("Bloqueios", rows.length, reportTable(
          ["Tipo", "Unidade", "Leito", "Motivo", "Status"],
          rows.map(r => [statusTag(r.tipo_bloqueio), r.unidade, r.leito, r.motivo || r.observacao, statusTag(r.status)])
        )));
      }

      return `
        <div class="report-doc" id="reportDoc">
          <div class="doc-hero">
            <h2>Relatório de passagem de plantão — NIR</h2>
            <div class="doc-meta">${meta}</div>
          </div>
          <div class="doc-body">${sections.join("")}</div>
        </div>
      `;
    }

    function reportSection(title, count, inner) {
      const pill = (count || count === 0) && count !== "" ? `<span class="count-pill">${count}</span>` : "";
      return `<section class="report-section"><h3>${esc(title)}${pill}</h3>${inner}</section>`;
    }

    function kpiCard(title, value, note, tone) {
      return `<div class="report-kpi ${tone ? "is-" + tone : ""}"><span>${esc(title)}</span><strong>${value}</strong><small>${esc(note || "")}</small></div>`;
    }

    function distribution(rows, asTag) {
      if (!rows || !rows.length) return `<div class="empty">Sem dados no filtro.</div>`;
      const max = Math.max(1, ...rows.map(r => Number(r.count) || 0));
      return `<div class="report-dist">${rows.slice(0, 12).map(r => {
        const count = Number(r.count) || 0;
        const labelHtml = asTag && r.label ? formatCell("status", r.label) : esc(r.label || "-");
        return `
        <div class="dist-line">
          <div class="bar-label" title="${esc(r.label)}">${labelHtml}</div>
          <div class="dist-track"><div class="dist-fill" style="width:${Math.max(4, count / max * 100)}%"></div></div>
          <strong>${count}</strong>
        </div>`;
      }).join("")}</div>`;
    }

    function reportTable(headers, rows) {
      if (!rows || !rows.length) return `<div class="empty">Nenhum registro em aberto.</div>`;
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${headers.map(h => `<th scope="col">${esc(h)}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map(cells => `<tr>${cells.map(reportCell).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function reportCell(value) {
      if (value && typeof value === "object" && value.html !== undefined) return `<td>${value.html}</td>`;
      const text = String(value ?? "").trim();
      return `<td>${text ? esc(text) : "-"}</td>`;
    }

    function statusTag(value) {
      return value ? { html: formatCell("status", value) } : "-";
    }

    function patient(row) {
      return row.paciente_alias || row.paciente_nome || row.prontuario || row.fastmedic || "Sem identificador";
    }

    function formatShiftId(shiftId) {
      return String(shiftId || "").replace(/(\d{4})(\d{2})(\d{2})/g, (_, y, m, d) => `${d}${m}${y}`);
    }

    async function generateReport() {
      if (state.reportGenerating) return;
      const moduleSelect = document.getElementById("reportModule");
      state.filters.reportModule = moduleSelect ? moduleSelect.value : "";
      state.reportGenerating = true;
      renderReport();
      toast("Gerando relatório...");
      try {
        if (!state.reportRequest) {
          state.reportRequest = server("generateReport", { filters: compactFilters() })
            .finally(() => { state.reportRequest = null; });
        }
        const res = await state.reportRequest;
        if (!res.ok) return toast(res.error.message || "Erro ao gerar relatório.", "danger");
        state.report = res.data;
        toast("Relatório gerado.", "ok");
      } finally {
        state.reportGenerating = false;
        renderReport();
      }
    }

    async function copyReport() {
      if (!state.report || !state.report.text) return toast("Gere o relatório primeiro.", "info");
      await navigator.clipboard.writeText(state.report.text);
      toast("Texto copiado.", "ok");
    }

    async function renderAudit(token) {
      renderAuditShell(state.auditLogRows, state.archivedRecords, { loading: true });

      if (!state.auditLogRequest) {
        state.auditLogRequest = server("listLog", { limit: 100 })
          .finally(() => { state.auditLogRequest = null; });
      }
      if (!state.archivedRecordsRequest) {
        state.archivedRecordsRequest = server("listArchivedRecords", { limit: 50 })
          .finally(() => { state.archivedRecordsRequest = null; });
      }

      const [logRes, archRes] = await Promise.all([state.auditLogRequest, state.archivedRecordsRequest]);

      if (isStale(token) || state.view !== "audit") return;

      const rows = logRes && logRes.ok && logRes.data.rows ? logRes.data.rows : [];
      if (logRes && !logRes.ok) toast(logRes.error.message || "Erro ao carregar historico.");
      state.auditLogRows = rows;

      const archived = archRes && archRes.ok && archRes.data.archived ? archRes.data.archived : [];
      if (archRes && !archRes.ok) toast(archRes.error.message || "Erro ao carregar registros arquivados.");
      state.archivedRecords = archived;

      renderAuditShell(rows, archived, { loading: false });
    }

    function renderAuditShell(rows, archived, options = {}) {
      const active = state.app.activeShift;
      el.content.innerHTML = `
        <section class="surface">
          <div class="surface-header">
            <div class="surface-title"><h2>Governança mínima</h2><span>O que este app precisa garantir para ser confiável</span></div>
          </div>
          <div class="surface-body grid grid-2">
            <div>
              <h3>Plantão</h3>
              <p>Plantão ativo: <strong>${active ? `${esc(formatDateBr(active.data))} ${esc(active.turno)}` : "nenhum"}</strong></p>
              <p>Ao encerrar, o sistema salva snapshot do relatório e limpa o plantão ativo.</p>
            </div>
            <div>
              <h3>Auditoria</h3>
              <p>Registros não são apagados fisicamente; são arquivados com deleted_at.</p>
              <p>Alterações relevantes geram linha em NIR_LOG com antes/depois.</p>
            </div>
            <div>
              <h3>Privacidade</h3>

    function renderArchivedRecordsSection(archived, options = {}) {
      if (!archived.length) {
        return `<section class="surface"><div class="surface-body"><div class="empty">${options.loading ? "Carregando registros arquivados..." : "Nenhum registro arquivado."}</div></div></section>`;

    function renderArchivedRecords(records, options = {}) {
      if (!records.length) {

      }
      return `

    function renderAuditRows(rows, options = {}) {
      if (!rows.length) {
        return `<div class="empty">${options.loading ? "Carregando histórico..." : "Nenhum evento registrado ainda."}</div>`;
      }
      return `
        <div class="table-wrap">
          <table>
            <thead><tr><th scope="col">Data/hora</th><th scope="col">Usuário</th><th scope="col">Módulo</th><th scope="col">Ação</th><th scope="col">Registro</th></tr></thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${esc(formatDateTimeBr(row.data_hora))}</td>

                  <td>${esc(row.registro_id || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;

    function formatDateTimeBr(value) {
      if (!value) return "";
      const date = new Date(String(value).replace(" ", "T"));
      return isNaN(date) ? String(value) : date.toLocaleString("pt-BR");
    }

    function normalizeDateValue(value) {
      if (!value) return "";
      if (Object.prototype.toString.call(value) === "[object Date]" && !isNaN(value)) {
        return value.toISOString().slice(0, 10);
      }
      const text = String(value).trim();
      const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
      const br = text.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})/);
      if (br) {
        const year = br[3].length === 2 ? `20${br[3]}` : br[3];
        return `${year}-${pad2(br[2])}-${pad2(br[1])}`;
      }
      const date = new Date(text.replace(" ", "T"));
      if (isNaN(date)) return "";
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function formatDateBr(value) {
      const normalized = normalizeDateValue(value);
      if (!normalized) return value ? String(value) : "";
      const parts = normalized.split("-");
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function isDateOnlyKey(key) {
      return ["data", "data_solicitacao", "data_internacao", "data_programacao", "ultimo_contato", "data_inicio", "previsao"].includes(key);
    }

    function openRecordDrawer(moduleKey, row = {}) {
      const meta = MODULES[moduleKey];
      state.editing = { type: "record", moduleKey, row };
      el.drawerTitle.textContent = row.id ? "Editar registro" : "Novo registro";
      el.drawerSubtitle.textContent = meta.title;
      el.drawerBody.innerHTML = renderFields(meta.fields, row);
      openDrawer();
    }

    function openShiftDrawer() {
      const row = state.app && state.app.activeShift ? state.app.activeShift : { data: today(), turno: "MT" };
      state.editing = { type: "shift", row };
      el.drawerTitle.textContent = row.id ? "Equipe do plantão" : "Abrir plantão";
      el.drawerSubtitle.textContent = "Data, turno, ilhas e responsáveis";
      el.drawerBody.innerHTML = renderFields([
        ["data", "Data", "date"],
        ["turno", "Turno", "select", ["MT", "SN"]],
        ["medico_ilha_1", "Médico ilha 1", "text"],
        ["medico_ilha_2", "Médico ilha 2", "text"],
        ["medico_ilha_3", "Médico ilha 3", "text"],
        ["enfermeiro_ilha_1", "Enfermeiro ilha 1", "text"],
        ["enfermeiro_ilha_2", "Enfermeiro ilha 2", "text"],
        ["enfermeiro_ilha_3", "Enfermeiro ilha 3", "text"],
        ["adm_ilha_1", "ADM ilha 1", "text"],
        ["adm_ilha_2", "ADM ilha 2", "text"],
        ["adm_ilha_3", "ADM ilha 3", "text"],
        ["coordenacao", "Coordenação", "text"],
        ["observacao", "Observação", "textarea"]
      ], row);
      openDrawer();
    }

    function renderFields(fields, row) {
      return `<div class="grid grid-2">${fields.map(field => renderField(field, row)).join("")}</div>`;
    }

    function renderField(field, row) {
      const [name, title, type, options] = field;
      const value = row && row[name] ? row[name] : "";
      const inputValue = type === "date" ? normalizeDateValue(value) : value;
      if (type === "textarea") {
        return `<div class="field" style="grid-column: 1 / -1;"><label>${esc(title)}</label><textarea class="textarea" name="${name}">${esc(value)}</textarea></div>`;
      }
      if (type === "select" || type === "select-status" || type === "select-specialty") {
        const opts = type === "select-status" ? getOptions().statuses : type === "select-specialty" ? getOptions().specialties : options;
        return `<div class="field"><label>${esc(title)}</label><select class="select" name="${name}">
          <option value=""></option>
          ${(opts || []).map(opt => `<option value="${esc(opt)}" ${String(value) === String(opt) ? "selected" : ""}>${esc(opt)}</option>`).join("")}
        </select></div>`;
      }
      return `<div class="field"><label>${esc(title)}</label><input class="input" type="${type}" name="${name}" value="${esc(inputValue)}"></div>`;
    }

    let drawerLastFocus = null;

    function openDrawer() {
      drawerLastFocus = document.activeElement;
      el.drawer.classList.add("open");
      el.drawer.setAttribute("aria-hidden", "false");
      const first = el.drawerBody.querySelector("input, select, textarea, button");
      if (first) setTimeout(() => first.focus(), 60);
    }

    function closeDrawer() {
      el.drawer.classList.remove("open");
      el.drawer.setAttribute("aria-hidden", "true");
      state.editing = null;
      if (drawerLastFocus && typeof drawerLastFocus.focus === "function") {
        drawerLastFocus.focus();
        drawerLastFocus = null;
      }
    }

    let pendingConfirmResolve = null;

    function askConfirm(options = {}) {
      if (pendingConfirmResolve) resolveConfirm(false);
      el.confirmTitle.textContent = options.title || "Confirmar ação";
      el.confirmMessage.textContent = options.message || "Deseja continuar?";
      el.confirmAccept.textContent = options.acceptLabel || "Confirmar";
      el.confirmAccept.classList.toggle("btn-danger", options.danger !== false);
      el.confirmModal.classList.add("open");
      el.confirmModal.setAttribute("aria-hidden", "false");
      el.confirmAccept.focus();
      return new Promise(resolve => {
        pendingConfirmResolve = resolve;
      });
    }

    function resolveConfirm(value) {
      if (!pendingConfirmResolve) return;
      const resolve = pendingConfirmResolve;
      pendingConfirmResolve = null;
      el.confirmModal.classList.remove("open");
      el.confirmModal.setAttribute("aria-hidden", "true");
      resolve(!!value);
    }

    async function submitDrawer(event) {
      event.preventDefault();
      if (!state.editing || state.saving) return;
      const formData = new FormData(el.drawerForm);
      const data = Object.fromEntries(formData.entries());
      if (state.editing.row && state.editing.row.id) data.id = state.editing.row.id;

      const saveBtn = el.drawerForm.querySelector('[type="submit"]');
      const isShift = state.editing.type === "shift";
      const editedModuleKey = state.editing.moduleKey;
      state.saving = true;
      if (saveBtn) { saveBtn.textContent = "Salvando…"; saveBtn.disabled = true; }
      try {
        const res = isShift
          ? await server(state.app && state.app.activeShift ? "updateShift" : "startShift", data)
          : await server("saveRecord", { module: state.editing.moduleKey, record: data });
        if (!res.ok) return toast(res.error.message || "Erro ao salvar.", "danger");
        closeDrawer();
        clearModuleCache(isShift ? null : editedModuleKey);
        toast(isShift ? "Plantão salvo." : "Registro salvo.", "ok");
        await loadState();
      } finally {
        state.saving = false;
        if (saveBtn) { saveBtn.textContent = "Salvar"; saveBtn.disabled = false; }
      }
    }

    async function closeShift() {
      if (!state.app || !state.app.activeShift) return toast("Nenhum plantão ativo.");
      if (state.saving) return;
      const ok = await askConfirm({
        title: "Encerrar plantão",
        message: "O plantão ativo será encerrado e um snapshot leve será salvo. O relatório detalhado continua disponível na aba Relatório.",
        acceptLabel: "Encerrar plantão"
      });
      if (!ok) return;
      const btn = document.getElementById("btnCloseShift");
      state.saving = true;
      if (btn) { btn.textContent = "Encerrando…"; btn.disabled = true; }
      try {
        const res = await server("closeShift", { filters: compactFilters() });
        if (!res.ok) return toast(res.error.message || "Erro ao encerrar.", "danger");
        state.report = res.data.report;
        clearModuleCache();
        toast("Plantão encerrado e relatório salvo.", "ok");
        await loadState();
      } finally {
        state.saving = false;
        if (btn) { btn.textContent = "Encerrar"; btn.disabled = false; }
      }
    }

    function compactFilters() {
      const f = Object.assign({}, state.filters);
      Object.keys(f).forEach(key => {
        if (f[key] === "" || f[key] === null || f[key] === undefined) delete f[key];
      });
      return f;
    }

    function getOptions() {
      return state.app && state.app.options ? state.app.options : DEFAULT_OPTIONS;

    function label(key) {
      return key
        .replace(/_/g, " ")
        .replace(/\b\w/g, s => s.toUpperCase())
        .replace("Uib", "UIB")
        .replace("Srpa", "SRPA");
    }

    function formatCell(key, value) {
      if (!value) return "";
      if (key === "status" || key === "status_leito" || key === "tipo_bloqueio") {
        const type = /NEGADO|CANCELADO|BLOQUEADO/.test(value) ? "danger" : /RESERVADO|PENDENTE|AGUARDA|FALTA/.test(value) ? "warn" : /INTERNADO|CONCLUIDO|REALIZADO|LIVRE/.test(value) ? "ok" : "info";
        return `<span class="tag ${type}">${esc(value)}</span>`;
      }
      if (isDateOnlyKey(key)) return esc(formatDateBr(value));
      return esc(value);
    }

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function today() {
      return new Date().toISOString().slice(0, 10);

    function pad2(value) {
      return String(value).padStart(2, "0");

    function toast(message, type = "") {
      el.toast.textContent = message;
      el.toast.classList.remove("ok", "danger", "info");
      if (type) el.toast.classList.add(type);
      el.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.toast.classList.remove("show"), 2600);
    }

    function server(fn, payload) {
      if (hasAppsScript) {
        return new Promise(resolve => {
          let done = false;
          const finish = value => { if (!done) { done = true; resolve(value); } };
          const timer = setTimeout(() => finish({ ok: false, error: { message: "Tempo de resposta excedido. Tente novamente." } }), 30000);
          google.script.run
            .withSuccessHandler(value => { clearTimeout(timer); finish(value); })
            .withFailureHandler(error => { clearTimeout(timer); finish({ ok: false, error: { message: error.message || String(error) } }); })
            [fn](payload || {});
        });
      }
      return Promise.resolve(mockServer(fn, payload || {}));
    }

    function mockServer(fn, payload) {
      const store = getStore();
      const api = {
        getAppState() {
          return { ok: true, data: buildMockState(store, payload.filters || {}) };
        },
        listRecords() {
          return { ok: true, data: { module: payload.module, rows: filterMock(store[payload.module] || [], payload.filters || {}) } };
        },
        startShift() {
          store.activeShift = Object.assign({ id: "PLT-DEMO", status: "ABERTO", aberto_em: new Date().toISOString() }, payload);
          saveStore(store);
          return { ok: true, data: { activeShift: store.activeShift } };
        },
        updateShift() {
          store.activeShift = Object.assign({}, store.activeShift || {}, payload);
          saveStore(store);
          return { ok: true, data: { activeShift: store.activeShift } };
        },
        closeShift() {
          const report = buildMockReport(store, payload.filters || {});
          store.reports.push(report);
          store.activeShift = null;
          saveStore(store);
          return { ok: true, data: { activeShift: null, report } };
        },
        saveRecord() {
          const list = store[payload.module] || [];
          const record = Object.assign({}, payload.record);
          const isNew = !record.id;
          record.id = record.id || `${payload.module.toUpperCase()}-${Math.random().toString(16).slice(2, 8).toUpperCase()}`;
          record.updated_at = new Date().toISOString();
          const index = list.findIndex(item => item.id === record.id);
          if (index >= 0) list[index] = Object.assign({}, list[index], record);
          else list.push(record);
          store[payload.module] = list;
          mockLog(store, payload.module, isNew ? "REGISTRO_CRIADO" : "REGISTRO_ATUALIZADO", record.id);
          saveStore(store);
          return { ok: true, data: { record } };
        },
        deleteRecord() {
          const list = store[payload.module] || [];
          const item = list.find(r => r.id === payload.id);
          if (item) {
            item.deleted_at = new Date().toISOString();
            mockLog(store, payload.module, "REGISTRO_ARQUIVADO", payload.id);
            saveStore(store);
          }
          return { ok: true, data: { deleted: !!item } };
        },
        listLog() {
          const rows = (store.log || []).slice().reverse().slice(0, payload.limit || 100);
          return { ok: true, data: { rows, total: (store.log || []).length } };
        },
        generateReport() {
          return { ok: true, data: buildMockReport(store, payload.filters || {}) };
        }
      };
      return api[fn] ? api[fn]() : { ok: false, error: { message: `Função não encontrada: ${fn}` } };
    }

    function mockLog(store, moduleKey, action, recordId) {
      store.log = store.log || [];
      store.log.push({
        id: `LOG-${Math.random().toString(16).slice(2, 8).toUpperCase()}`,
        data_hora: new Date().toISOString(),
        usuario: "modo-demo@local",
        plantao_id: store.activeShift ? store.activeShift.id : "",
        modulo: moduleKey,
        acao: action,
        registro_id: recordId || ""

      if (show("procedures")) {
        lines.push("", "PROCEDIMENTOS E EXAMES",
          ...filterMock(store.procedures, filters).filter(row => !isFinal(row.status)).map(row => `- ${row.tipo || "-"} | ${row.paciente_alias || "-"} | ${row.procedimento || "-"} | ${row.data_programacao || "-"} ${row.hora_programacao || ""} | ${row.status || "-"}`));
      }
      if (show("icu")) {
        lines.push("", "UTI / SRPA",
          ...filterMock(store.icu, filters).map(row => `- ${row.tipo || "-"} | ${row.paciente_alias || "-"} | ${row.leito_atual || "-"} -> ${row.destino || "-"} | ${row.status || "-"}`));
      }
      if (show("blocks")) {
        lines.push("", "BLOQUEIOS",
          ...filterMock(store.blocks, filters).filter(row => row.status !== "ENCERRADO").map(row => `- ${row.tipo_bloqueio || "-"} | ${row.unidade || "-"} ${row.leito || "-"} | ${row.motivo || row.observacao || ""}`));
      }
      return {
        id: "REL-DEMO",
        text: lines.join("\n"),
        kpis: d.kpis,
        generatedAt: new Date().toISOString(),
        plantao_id: store.activeShift ? store.activeShift.id : "",
        filters: filters,
        sections: {
          resumo: [],
          regulacoes: filterMock(store.regulations, filters),
          leitos: filterMock(store.beds, filters),
          procedimentos: filterMock(store.procedures, filters),
          uti: filterMock(store.icu, filters),
          bloqueios: filterMock(store.blocks, filters),
          especialidades: d.bySpecialty,
          status: d.byStatus
        }
      };
    }

    function filterMock(rows, filters) {
      const f = filters || {};
      const term = (f.search || "").toLowerCase();
      return (rows || []).filter(row => {
        if (row.deleted_at) return false;
        if (f.turno && f.turno !== "TODOS" && row.turno && row.turno !== f.turno) return false;
        if (f.onlyPending && isFinal(row.status || row.status_leito || row.desfecho)) return false;
        if (term && JSON.stringify(row).toLowerCase().indexOf(term) === -1) return false;
        if (f.dateFrom || f.dateTo) {
          const date = row.data_solicitacao || row.data_programacao || row.data_internacao || row.data_inicio || "";
          if (f.dateFrom && date < f.dateFrom) return false;
          if (f.dateTo && date > f.dateTo) return false;
        }
        return true;
      });
    }

    function kpis(regulations, beds, procedures, icu, blocks) {
      return {
        regulacoes: regulations.length,
        reservados: regulations.filter(r => r.status === "RESERVADO").length,
        internados: regulations.filter(r => r.status === "INTERNADO").length,
        negados: regulations.filter(r => r.status === "NEGADO").length,
        cancelados: regulations.filter(r => r.status === "CANCELADO").length,
        pendentes: regulations.filter(r => !isFinal(r.status)).length,
        leitos_ocupados_ou_reservados: beds.filter(r => r.status_leito !== "LIVRE").length,
        procedimentos_pendentes: procedures.filter(r => !isFinal(r.status)).length,
        altas_uti_aguardando_leito: icu.filter(r => r.tipo === "ALTA_UTI_AGUARDANDO_LEITO").length,
        bloqueios_abertos: blocks.filter(r => r.status !== "ENCERRADO").length,
        tempo_medio_reserva_horas: avgHours(regulations, "vaga_dada_em", "reservado_em"),
        tempo_medio_chegada_horas: avgHours(regulations, "reservado_em", "chegou_em"),
        permanencia_media_dias: avgNumber(beds, "permanencia_dias")
      };
    }

    function avgHours(rows, startKey, endKey) {
      const values = (rows || []).map(row => {
        const start = new Date(String(row[startKey] || "").replace(" ", "T"));
        const end = new Date(String(row[endKey] || "").replace(" ", "T"));
        if (isNaN(start) || isNaN(end)) return null;
        return (end.getTime() - start.getTime()) / 36e5;
      }).filter(v => v !== null && !isNaN(v) && v >= 0);
      if (!values.length) return 0;
      return Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 10) / 10;
    }

    function avgNumber(rows, key) {
      const values = (rows || []).map(row => Number(row[key])).filter(v => !isNaN(v));
      if (!values.length) return 0;
      return Math.round((values.reduce((a, b) => a + b, 0) / values.length) * 10) / 10;
    }

    function group(rows, key) {
      const map = {};
      rows.forEach(row => {
        const label = row[key] || "Não informado";
        map[label] = (map[label] || 0) + 1;
      });
      return Object.keys(map).map(label => ({ label, count: map[label] })).sort((a, b) => b.count - a.count);
    }

    function isFinal(status) {
      return ["INTERNADO", "NEGADO", "CANCELADO", "CONCLUIDO", "REALIZADO", "ALTA", "OBITO", "TRANSFERIDO"].includes(String(status || "").toUpperCase());
    }
  </script>
